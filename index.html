
<style>
:root {
  --font-sans: "Segoe UI", Arial, sans-serif;
  --color-text-primary: #1f2937;
  --color-text-secondary: #6b7280;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f6f7f9;
  --color-border-secondary: #cbd5e1;
  --color-border-tertiary: #e5e7eb;
  --border-radius-md: 10px;
  --border-radius-lg: 16px;
}

body {
  font-family: var(--font-sans);
  background: #f3f4f6;
  color: var(--color-text-primary);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1rem 0; font-family: var(--font-sans); }
.logo { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; color: var(--color-text-primary); }
.logo-over { color: #1D9E75; }
.logo-under { color: #E24B4A; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.player-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.player-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 18px 8px; cursor: pointer; font-family: var(--font-sans); transition: border-color 0.15s; text-align: center; }
.player-btn:hover { border-color: #1D9E75; }
.p-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; margin: 0 auto 8px; }
.p-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.pin-wrap { max-width: 260px; margin: 0 auto; text-align: center; padding: 0.5rem 0 1rem; }
.pin-title { font-size: 18px; font-weight: 500; margin-bottom: 4px; color: var(--color-text-primary); }
.pin-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; }
.pin-big-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; margin: 0 auto 1rem; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); background: transparent; transition: all 0.15s; }
.pin-dot.filled { background: #1D9E75; border-color: #1D9E75; }
.pin-dot.error { background: #E24B4A; border-color: #E24B4A; }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 200px; margin: 0 auto; }
.num-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 13px; font-size: 18px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); color: var(--color-text-primary); transition: background 0.1s; }
.num-btn:hover { background: var(--color-background-primary); border-color: var(--color-border-secondary); }
.tabs { display: flex; gap: 4px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 4px; margin-bottom: 1.5rem; }
.tab { flex: 1; padding: 7px 4px; text-align: center; font-size: 12px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.15s; }
.tab.active { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.person-tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1rem; }
.person-tab { padding: 10px 12px; text-align: center; font-size: 13px; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.15s; }
.person-tab.active { color: var(--color-text-primary); font-weight: 500; border-color: #1D9E75; background: #E1F5EE; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.sec-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.bet-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 10px; }
.bet-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.bet-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; margin-right: 10px; line-height: 1.4; }
.bet-title.blurred { filter: blur(5px); user-select: none; }
.badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.badge-open { background: #E6F1FB; color: #185FA5; }
.badge-settled { background: #EAF3DE; color: #3B6D11; }
.line-box { display: flex; align-items: center; justify-content: space-between; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; margin: 8px 0; }
.line-label { font-size: 12px; color: var(--color-text-secondary); }
.line-value { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.line-unit { font-size: 12px; color: var(--color-text-secondary); margin-left: 3px; }
.ou-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
.ou-btn { padding: 10px; border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); font-family: var(--font-sans); transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
.ou-btn-over { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
.ou-btn-under { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.ou-btn-over:hover { background: #9FE1CB; }
.ou-btn-under:hover { background: #F7C1C1; }
.ou-btn .ou-side { font-size: 15px; font-weight: 500; }
.ou-btn .ou-odds { font-size: 11px; opacity: 0.8; }
.my-wager-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; margin-top: 6px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }
.my-wager-side-over { color: #0F6E56; font-weight: 500; }
.my-wager-side-under { color: #A32D2D; font-weight: 500; }
.pool-row { display: flex; gap: 12px; font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
.pool-over { color: #0F6E56; }
.pool-under { color: #A32D2D; }
.subject-warning { font-size: 12px; color: #854F0B; background: #FAEEDA; padding: 7px 10px; border-radius: var(--border-radius-md); margin-bottom: 8px; }
.btn { padding: 7px 14px; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); font-family: var(--font-sans); transition: all 0.15s; }
.btn:hover { background: var(--color-background-secondary); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-green { background: #1D9E75; color: #E1F5EE; border-color: #1D9E75; }
.btn-green:hover { background: #0F6E56; }
.btn-red { background: #E24B4A; color: #FCEBEB; border-color: #E24B4A; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1rem 0; }
.form-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 1rem; }
.flabel { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 5px; display: block; }
.frow { margin-bottom: 12px; }
input[type=text],input[type=number],select,textarea { width: 100%; padding: 8px 10px; font-size: 14px; font-family: var(--font-sans); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); }
textarea { resize: vertical; min-height: 56px; }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.lb-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-size: 13px; font-weight: 500; width: 22px; color: var(--color-text-secondary); flex-shrink: 0; }
.lb-rank.gold { color: #BA7517; }
.lb-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-right: 10px; }
.lb-info { flex: 1; }
.lb-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.lb-record { font-size: 12px; color: var(--color-text-secondary); }
.lb-pnl { font-size: 15px; font-weight: 500; }
.pnl-pos { color: #1D9E75; }
.pnl-neg { color: #E24B4A; }
.pnl-blur { filter: blur(5px); }
.wager-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.modal-wrap { background: rgba(0,0,0,0.45); min-height: 500px; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 20px; width: 90%; max-width: 340px; border: 0.5px solid var(--color-border-tertiary); }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
.settle-opt { padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; cursor: pointer; font-size: 14px; color: var(--color-text-primary); transition: all 0.12s; }
.settle-opt.over { border-color: #5DCAA5; background: #E1F5EE; color: #085041; }
.settle-opt.under { border-color: #F09595; background: #FCEBEB; color: #791F1F; }
.settle-opt.selected.over { background: #5DCAA5; }
.settle-opt.selected.under { background: #F09595; }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; }
.top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.top-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.empty { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.hint { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; }
</style>

<div class="app" id="app">

<div id="s-players">
  <div class="header">
    <div class="logo"><span class="logo-over">Over</span><span class="logo-under">Under</span></div>
  </div>

    <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;">Who are you?</div>

</div>

<script>
const CONFIG = {
  // Fill these in to make the app load/save shared data through JSONBin.
  jsonBinId: '69c2608eaa77b81da9141e35',
  apiKey: '$2a$10$TjKftwh/7DpLfmx2r2ccj.okpkVZTpdNqZh7WycR9dB6ssH1nQF9K',
  accessKey: '',
};

const PLAYERS = [
  {name:'Aidan',   bg:'#E6F1FB', fg:'#185FA5'},
  {name:'Chris',   bg:'#E1F5EE', fg:'#0F6E56'},
  {name:'Jorik',   bg:'#FAEEDA', fg:'#854F0B'},
  {name:'Thijmen', bg:'#FBEAF0', fg:'#993556'},
  {name:'Thijs',   bg:'#EAF3DE', fg:'#3B6D11'},
  {name:'Thom',    bg:'#EEEDFE', fg:'#534AB7'},
];

const S = {
  pins: {}, buf: '', pinMode: null, confirmBuf: '',
  current: null, settleId: null, settleChoice: null,
  allFilter: null,
  saving: false,
  nextId: 4,
  bets: [
    {id:1, desc:"Times Chris complains about the food", subject:"Chris", creator:"Aidan",
     unit:"complaints", line:2.5, status:"open", result:null,
     wagers:[{person:"Aidan",amount:5,side:"over"},{person:"Jorik",amount:4,side:"under"}]},
    {id:2, desc:"Hours Thijmen spends navigating vs following others", subject:"Thijmen", creator:"Thijs",
     unit:"hours", line:4.5, status:"open", result:null,
     wagers:[{person:"Thijs",amount:5,side:"over"},{person:"Thom",amount:5,side:"under"},{person:"Aidan",amount:5,side:"over"}]},
    {id:3, desc:"Times Jorik is last one ready in the morning", subject:"Jorik", creator:"Chris",
     unit:"mornings", line:3.5, status:"settled", result:"over",
     wagers:[{person:"Chris",amount:5,side:"over"},{person:"Thijmen",amount:4,side:"under"}]},
  ]
};

function pc(name){ return PLAYERS.find(p=>p.name===name)||{bg:'#F1EFE8',fg:'#5F5E5A'}; }
function av(name,sz=44,fs=15,ml=0){
  const c=pc(name);
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${c.bg};color:${c.fg};display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:500;flex-shrink:0;${ml?'margin-left:'+ml+'px':''}">${name.slice(0,2).toUpperCase()}</div>`;
}

function hasRemoteStorage(){
  return Boolean(CONFIG.jsonBinId && CONFIG.apiKey);
}

function storageHeaders(){
  const headers = {
    'Content-Type': 'application/json',
    'X-Master-Key': CONFIG.apiKey,
  };
  if(CONFIG.accessKey) headers['X-Access-Key'] = CONFIG.accessKey;
  return headers;
}

function exportState(){
  return {
    pins: S.pins,
    nextId: S.nextId,
    bets: S.bets,
  };
}

function applyLoadedState(data){
  if(!data || typeof data !== 'object') return;
  if(data.pins && typeof data.pins === 'object') S.pins = data.pins;
  if(Array.isArray(data.bets)) S.bets = data.bets;
  if(typeof data.nextId === 'number') S.nextId = data.nextId;
}

async function loadRemoteState(){
  if(!hasRemoteStorage()) return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonBinId}/latest`, {
      headers: storageHeaders(),
    });
    if(!res.ok) throw new Error(`Load failed: ${res.status}`);
    const payload = await res.json();
    applyLoadedState(payload.record || payload);
  } catch (err) {
    console.error(err);
    alert('Could not load shared data from JSONBin. The page will keep using the local demo data.');
  }
}

async function saveRemoteState(){
  if(!hasRemoteStorage() || S.saving) return;
  S.saving = true;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonBinId}`, {
      method: 'PUT',
      headers: storageHeaders(),
      body: JSON.stringify(exportState()),
    });
    if(!res.ok) throw new Error(`Save failed: ${res.status}`);
  } catch (err) {
    console.error(err);
    alert('Could not save shared data to JSONBin.');
  } finally {
    S.saving = false;
  }
}

function show(id){ ['s-players','s-pin','s-main','s-settle'].forEach(s=>document.getElementById(s).style.display=s===id?'block':'none'); }

function renderPlayers(){
  document.getElementById('player-grid').innerHTML=PLAYERS.map(p=>`
    <button class="player-btn" onclick="selPlayer('${p.name}')">
      <div class="p-avatar" style="background:${p.bg};color:${p.fg}">${p.name.slice(0,2).toUpperCase()}</div>
      <div class="p-name">${p.name}</div>
    </button>`).join('');
}

function selPlayer(name){
  S.current=name; S.buf=''; S.confirmBuf='';
  S.allFilter = null;
  document.getElementById('pin-av').innerHTML=av(name,56,20);
  if(S.pins[name]){ document.getElementById('pin-title').textContent=`Hey ${name}!`; document.getElementById('pin-sub').textContent='Enter your PIN'; S.pinMode='enter'; }
  else { document.getElementById('pin-title').textContent='Set your PIN'; document.getElementById('pin-sub').textContent='Choose a 4-digit PIN — keep it secret!'; S.pinMode='set'; }
  document.getElementById('pin-hint').textContent='';
  updDots(); show('s-pin');
}

function np(d){ if(S.buf.length>=4)return; S.buf+=d; updDots(); if(S.buf.length===4)setTimeout(checkPin,180); }
function nd(){ S.buf=S.buf.slice(0,-1); updDots(); }
function updDots(err=false){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.classList.toggle('filled',i<S.buf.length&&!err);
    d.classList.toggle('error',err);
  });
}
function checkPin(){
  const name=S.current;
  if(S.pinMode==='set'){
    if(!S.confirmBuf){ S.confirmBuf=S.buf; S.buf=''; document.getElementById('pin-sub').textContent='Confirm your PIN'; updDots(); return; }
    if(S.buf===S.confirmBuf){ S.pins[name]=S.buf; S.confirmBuf=''; saveRemoteState(); enterDash(); }
    else{ updDots(true); setTimeout(()=>{ S.buf=''; S.confirmBuf=''; updDots(); document.getElementById('pin-sub').textContent='PINs didn\'t match — try again'; },600); }
  } else {
    if(S.buf===S.pins[name]){ enterDash(); }
    else{ updDots(true); setTimeout(()=>{ S.buf=''; updDots(); },600); }
  }
}
function enterDash(){
  document.getElementById('main-av').innerHTML=av(S.current,32,12);
  document.getElementById('main-name').textContent=S.current;
  show('s-main'); dt('my');
}
function logout(){ S.current=null; S.buf=''; show('s-players'); }
function goBack(){ S.buf=''; S.confirmBuf=''; show('s-players'); }

function dt(tab){
  ['my','all','lb','create'].forEach(t=>{
    document.getElementById('d-'+t).style.display=t===tab?'block':'none';
    const el=document.getElementById('dtab-'+t); if(el) el.classList.toggle('active',t===tab);
  });
  if(tab==='my') renderMy();
  if(tab==='all') renderAll();
  if(tab==='lb') renderLb();
  if(tab==='create') renderCreate();
}


function betCardHtml(b, me, isPublic){
  const isSubject = b.subject===me;
  const myWager = b.wagers.find(w=>w.person===me);
  const statusBadge = b.status==='open'?'<span class="badge badge-open">Open</span>':'<span class="badge badge-settled">Settled</span>';
  const titleClass = isSubject?'bet-title blurred':'bet-title';
  const titleText = isSubject?'?????? ????? ??? ???':b.desc;
  const subjectWarn = isSubject?`<div class="subject-warning">You are the subject — description hidden</div>`:'';
  const lineDisplay = isSubject
    ? `<div class="line-box"><span class="line-label">Line</span><span style="filter:blur(4px);font-size:18px;font-weight:500">?.?</span><span class="line-unit" style="filter:blur(4px)">${b.unit}</span></div>`
    : `<div class="line-box"><span class="line-label">Line</span><div><span class="line-value">${b.line}</span><span class="line-unit">${b.unit}</span></div></div>`;

  let wagerRow='', settleRow='', resultRow='', actionRow='';

  if(myWager){
    const sideClass=myWager.side==='over'?'my-wager-side-over':'my-wager-side-under';
    wagerRow=`<div class="my-wager-row"><span class="line-label">My pick</span><span class="${sideClass}">${myWager.side.toUpperCase()}</span></div>`;
  } else if(b.status==='open'&&!isSubject){
    actionRow=`<div class="ou-btns">
      <button class="ou-btn ou-btn-over" onclick="placeWager(${b.id},'over')"><span class="ou-side">OVER</span><span class="ou-odds">Bet</span></button>
      <button class="ou-btn ou-btn-under" onclick="placeWager(${b.id},'under')"><span class="ou-side">UNDER</span><span class="ou-odds">Bet</span></button>
    </div>`;
  }

  if(b.status==='settled'&&!isSubject){
    const rc=b.result==='over'?'#0F6E56':'#A32D2D';
    const rbg=b.result==='over'?'#E1F5EE':'#FCEBEB';
    resultRow=`<div style="margin-top:8px"><span style="font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:${rbg};color:${rc}">Result: ${b.result.toUpperCase()}</span></div>`;
  }

  if(b.status==='open'&&!isSubject){
    settleRow=`<div style="margin-top:8px"><button class="btn btn-sm" onclick="openSettle(${b.id})">Settle</button></div>`;
  }

  return `<div class="bet-card">
    ${subjectWarn}
    <div class="bet-head"><div class="${titleClass}">${titleText}</div>${statusBadge}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;">Subject: ${isSubject?'<b>you</b>':b.subject} · ${b.cat||'General'}</div>
    ${lineDisplay}
    ${actionRow}${wagerRow}${resultRow}${settleRow}
  </div>`;
}

function renderMy(){
  const me=S.current;
  const mine=S.bets.filter(b=>b.wagers.find(w=>w.person===me));
  const open=mine.filter(b=>b.status==='open');
  const settled=mine.filter(b=>b.status==='settled');
  const myStake=open.reduce((s,b)=>s+(b.wagers.find(w=>w.person===me)?.amount||0),0);
  const pnl=calcPnl(me);
  const pnlColor=pnl>=0?'#1D9E75':'#E24B4A';
  let html=`<div class="stats-grid">
    <div class="stat"><div class="stat-label">Open bets</div><div class="stat-value">${open.length}</div></div>
    <div class="stat"><div class="stat-label">At stake</div><div class="stat-value">€${myStake}</div></div>
    <div class="stat"><div class="stat-label">P&L</div><div class="stat-value" style="color:${pnlColor}">${pnl>=0?'+':''}€${Math.abs(pnl).toFixed(2)}</div></div>
  </div>`;
  if(open.length){ html+=`<div class="sec-title">Open</div>`+open.map(b=>betCardHtml(b,me,false)).join(''); }
  if(settled.length){ html+=`<div class="sec-title" style="margin-top:1rem">Settled</div>`+settled.map(b=>betCardHtml(b,me,false)).join(''); }
  if(!mine.length) html+=`<div class="empty">No bets yet — create a new line!</div>`;
  document.getElementById('d-my').innerHTML=html;
}

function renderAll(){
  const me=S.current;
  const others=PLAYERS.filter(p=>p.name!==me);
  if(!S.allFilter || S.allFilter===me) S.allFilter = others[0]?.name || null;
  const filtered=S.bets.filter(b=>b.subject===S.allFilter);
  const open=filtered.filter(b=>b.status==='open');
  const settled=filtered.filter(b=>b.status==='settled');
  const tabHtml=others.map(p=>`<button class="person-tab ${p.name===S.allFilter?'active':''}" onclick="setAllFilter('${p.name}')">${p.name}</button>`).join('');
  let html=`<div class="stats-grid">
    <div class="stat"><div class="stat-label">Selected player</div><div class="stat-value" style="font-size:17px">${S.allFilter||'-'}</div></div>
    <div class="stat"><div class="stat-label">Open lines</div><div class="stat-value">${open.length}</div></div>
    <div class="stat"><div class="stat-label">Settled</div><div class="stat-value" style="color:#1D9E75">${settled.length}</div></div>
  </div>`;
  html+=`<div class="person-tabs">${tabHtml}</div>`;
  if(open.length){ html+=`<div class="sec-title">Open lines</div>`+open.map(b=>betCardHtml(b,me,true)).join(''); }
  if(settled.length){ html+=`<div class="sec-title" style="margin-top:1rem">Settled</div>`+settled.map(b=>betCardHtml(b,me,true)).join(''); }
  if(!filtered.length) html+=`<div class="empty">No lines posted for ${S.allFilter} yet.</div>`;
  document.getElementById('d-all').innerHTML=html;
}

function setAllFilter(name){
  S.allFilter=name;
  renderAll();
}

function renderLb(){
  const me=S.current;
  const sorted=[...PLAYERS].sort((a,b)=>calcPnl(b.name)-calcPnl(a.name));
  let html=`<div class="stats-grid">
    <div class="stat"><div class="stat-label">Players</div><div class="stat-value">${PLAYERS.length}</div></div>
    <div class="stat"><div class="stat-label">Open lines</div><div class="stat-value">${S.bets.filter(b=>b.status==='open').length}</div></div>
    <div class="stat"><div class="stat-label">Settled</div><div class="stat-value" style="color:#1D9E75">${S.bets.filter(b=>b.status==='settled').length}</div></div>
  </div>
  <div class="form-card">`;
  html+=sorted.map((p,i)=>{
    const pnl=calcPnl(p.name);
    const isMe=p.name===me;
    const pnlStr=(pnl>=0?'+':'')+'€'+Math.abs(pnl).toFixed(2);
    const pnlCls=isMe?(pnl>=0?'lb-pnl pnl-pos':'lb-pnl pnl-neg'):'lb-pnl pnl-blur';
    const w=wins(p.name), l=losses(p.name);
    return `<div class="lb-row">
      <div class="lb-rank ${i===0?'gold':''}">${i===0?'★':(i+1)}</div>
      ${av(p.name,32,12,0).replace('flex-shrink:0','flex-shrink:0').replace('</div>','</div>').replace('<div style="','<div class="lb-avatar" style="')}
      <div class="lb-info"><div class="lb-name">${p.name}${isMe?' (you)':''}</div><div class="lb-record">${w}W · ${l}L</div></div>
      <div class="${pnlCls}">${pnlStr}</div>
    </div>`;
  }).join('');
  html+=`</div><div class="hint">Other players' P&L amounts are hidden</div>`;
  document.getElementById('d-lb').innerHTML=html;
}

function renderCreate(){
  const me=S.current;
  const others=PLAYERS.filter(p=>p.name!==me);
  document.getElementById('d-create').innerHTML=`<div class="form-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);">Manage lines</div>
      <button class="btn btn-sm btn-red" onclick="clearAllLines()">Clear all lines</button>
    </div>
    <div class="frow"><label class="flabel">Bulk add lines</label>
      <textarea id="f-bulk" placeholder="Times Chris orders dessert | Chris | 2.5 | times | Food & drink&#10;Minutes Thom is late | Thom | 10 | minutes | Social"></textarea></div>
    <div class="hint" style="margin-top:0;margin-bottom:10px;">Paste one line per row in this format: description | subject | line | unit | category</div>
    <button class="btn" style="width:100%;margin-bottom:12px;" onclick="bulkCreateBets()">Import pasted lines</button>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;">Add a single line</div>
    <div class="frow"><label class="flabel">What are we betting on?</label>
      <textarea id="f-desc" placeholder="e.g. Times Thom checks his phone during dinner"></textarea></div>
    <div class="fgrid">
      <div class="frow"><label class="flabel">Subject (can't see the line)</label>
        <select id="f-subj"><option value="">Select...</option>${others.map(p=>`<option>${p.name}</option>`).join('')}</select></div>
      <div class="frow"><label class="flabel">Category</label>
        <select id="f-cat"><option>Food & drink</option><option>Activities</option><option>Sleep</option><option>Social</option><option>Navigation</option><option>Other</option></select></div>
    </div>
    <div class="divider"></div>
    <div class="fgrid">
      <div class="frow"><label class="flabel">The line</label>
        <input type="number" id="f-line" placeholder="e.g. 3.5" step="0.5" min="0"></div>
      <div class="frow"><label class="flabel">Unit</label>
        <input type="text" id="f-unit" placeholder="e.g. times, hours, drinks"></div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;color:var(--color-text-secondary);margin-bottom:14px;">
      Bettors pick <span style="color:#0F6E56;font-weight:500">OVER</span> (will exceed the line) or <span style="color:#A32D2D;font-weight:500">UNDER</span> (will stay below). Winners split the losers' pool proportionally.
    </div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;">Your wager</div>
    <div class="fgrid">
      <div class="frow"><label class="flabel">Your side</label>
        <select id="f-side"><option value="over">OVER</option><option value="under">UNDER</option></select></div>
      <div class="frow"><label class="flabel">Amount (€)</label>
        <input type="number" id="f-amt" placeholder="€0" min="1" max="5"></div>
    </div>
    <div class="hint" style="margin-top:0;margin-bottom:10px;">Maximum stake per bet: €5</div>
    <button class="btn btn-green" style="width:100%;margin-top:4px;" onclick="createBet()">Post line</button>
  </div>`;
}

function createBet(){
  const desc=document.getElementById('f-desc').value.trim();
  const subj=document.getElementById('f-subj').value;
  const cat=document.getElementById('f-cat').value;
  const line=parseFloat(document.getElementById('f-line').value);
  const unit=document.getElementById('f-unit').value.trim()||'times';
  const side=document.getElementById('f-side').value;
  const amt=parseFloat(document.getElementById('f-amt').value);
  if(!desc){alert('Add a description');return;}
  if(!subj){alert('Select a subject');return;}
  if(isNaN(line)||line<0){alert('Set a line number');return;}
  if(isNaN(amt)||amt<=0){alert('Set your wager amount');return;}
  if(amt>5){alert('Maximum bet is €5');return;}
  S.bets.push({id:S.nextId++,desc,subject:subj,creator:S.current,cat,unit,line,status:'open',result:null,wagers:[{person:S.current,amount:amt,side}]});
  saveRemoteState();
  dt('my');
}

function placeWager(id, side){
  const b=S.bets.find(x=>x.id===id);
  if(!b || b.status!=='open') return;
  if(b.subject===S.current){ alert('You cannot bet on a line about yourself'); return; }
  if(b.wagers.find(w=>w.person===S.current)){ alert('You already placed a bet on this line'); return; }

  const raw=prompt(`How much do you want to bet on ${side.toUpperCase()}? Max 5`);
  if(raw===null) return;
  const amount=parseFloat(String(raw).replace(',', '.'));
  if(isNaN(amount) || amount<=0){ alert('Enter a valid amount'); return; }
  if(amount>5){ alert('Maximum bet is â‚¬5'); return; }

  b.wagers.push({ person:S.current, amount, side });
  saveRemoteState();
  dt('my');
}

function clearAllLines(){
  if(!confirm('Delete all current lines? This cannot be undone.')) return;
  S.bets = [];
  S.nextId = 1;
  saveRemoteState();
  dt('create');
}

function bulkCreateBets(){
  const raw=document.getElementById('f-bulk').value.trim();
  if(!raw){alert('Paste at least one line');return;}
  const names = new Set(PLAYERS.map(p=>p.name));
  const rows=raw.split('\n').map(r=>r.trim()).filter(Boolean);
  const parsed=[];

  for(const row of rows){
    const parts=row.split('|').map(p=>p.trim());
    if(parts.length < 4){
      alert(`Could not import this row:\n${row}\n\nUse: description | subject | line | unit | category`);
      return;
    }
    const [desc, subject, lineRaw, unit, categoryRaw] = parts;
    const line=parseFloat(lineRaw);
    if(!desc || !names.has(subject) || isNaN(line) || line < 0 || !unit){
      alert(`Could not import this row:\n${row}`);
      return;
    }
    parsed.push({
      id: S.nextId++,
      desc,
      subject,
      creator: S.current,
      cat: categoryRaw || 'Other',
      unit,
      line,
      status: 'open',
      result: null,
      wagers: [],
    });
  }

  S.bets.push(...parsed);
  document.getElementById('f-bulk').value='';
  saveRemoteState();
  alert(`Imported ${parsed.length} line${parsed.length===1?'':'s'}`);
  dt('all');
}

function openSettle(id){
  S.settleId=id; S.settleChoice=null;
  const b=S.bets.find(x=>x.id===id);
  document.getElementById('settle-desc').textContent=b.desc;
  document.getElementById('settle-line-disp').textContent=`Line: ${b.line} ${b.unit}`;
  document.getElementById('settle-opts').innerHTML=`
    <div class="settle-opt over" onclick="pickSettle('over',this)">OVER ${b.line} — exceeded the line</div>
    <div class="settle-opt under" onclick="pickSettle('under',this)">UNDER ${b.line} — stayed below</div>`;
  show('s-settle');
}
function pickSettle(val,el){
  S.settleChoice=val;
  document.querySelectorAll('.settle-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function closeSettle(){ show('s-main'); dt('my'); }
function confirmSettle(){
  if(!S.settleChoice){alert('Select a result');return;}
  const b=S.bets.find(x=>x.id===S.settleId);
  b.status='settled'; b.result=S.settleChoice;
  saveRemoteState();
  show('s-main'); dt('my');
}

function calcPnl(person){
  let t=0;
  S.bets.filter(b=>b.status==='settled').forEach(b=>{
    const mine=b.wagers.find(w=>w.person===person);
    if(!mine)return;
    if(mine.side===b.result){
      const losers=b.wagers.filter(w=>w.side!==b.result);
      const winners=b.wagers.filter(w=>w.side===b.result);
      const lostPool=losers.reduce((s,w)=>s+w.amount,0);
      const wonPool=winners.reduce((s,w)=>s+w.amount,0);
      t+=lostPool*(mine.amount/wonPool);
    } else { t-=mine.amount; }
  });
  return t;
}
function wins(p){ return S.bets.filter(b=>b.status==='settled'&&b.wagers.find(w=>w.person===p&&w.side===b.result)).length; }
function losses(p){ return S.bets.filter(b=>b.status==='settled'&&b.wagers.find(w=>w.person===p&&w.side!==b.result)).length; }

async function init(){
  await loadRemoteState();
  renderPlayers();
}

init();
</script>
